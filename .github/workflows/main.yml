name: 主力盘口&五维看股自动化
on:
schedule:
- cron: '*/15 * * * *'
- cron: '0 18 * * *'
workflow_dispatch:
 
jobs:
run:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- uses: actions/setup-python@v5
with:
python-version: '3.11'
- name: 安装依赖
run: pip install akshare requests pandas matplotlib
- name: 运行监控&选股
env:
SEND_KEY: ${{ secrets.SEND_KEY }}
run: python main.py
